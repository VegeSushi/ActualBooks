name: Build and Release Plugin

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew build

      - name: Debug build output
        run: ls -lah build/libs

      - name: Verify JAR exists
        run: |
          if [ ! -f build/libs/ActualBooks-ver.jar ]; then
            echo "ERROR: JAR not found"
            exit 1
          fi

      - name: Prepare release file
        run: |
          mkdir -p dist
          cp build/libs/ActualBooks-ver.jar dist/ActualBooks-ver.jar

      - name: Generate version
        run: echo "release-$(date +%Y%m%d-%H%M%S)" > version.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: Auto Release ${{ github.run_number }}
          files: dist/ActualBooks-ver.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
