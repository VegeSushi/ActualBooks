name: Build and Release Plugin

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew build

      - name: Show build output
        run: ls -lah build/libs

      - name: Find actual JAR
        run: |
          set -e

          JAR=$(find build/libs -type f -name "*.jar" | head -n 1)

          echo "Found: $JAR"

          if [ -z "$JAR" ]; then
            echo "ERROR: No jar produced by Gradle"
            exit 1
          fi

          mkdir -p dist
          cp "$JAR" dist/ActualBooks-ver.jar

          ls -lah dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ActualBooks
          path: dist/ActualBooks-ver.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: Auto Release ${{ github.run_number }}
          files: dist/ActualBooks-ver.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
