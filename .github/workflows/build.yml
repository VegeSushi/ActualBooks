name: Build and Release Plugin

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew build

      - name: List build output
        run: ls -lah build/libs || true

      - name: Find and prepare JAR
        run: |
          FILE=$(find build/libs -type f -name "*ActualBooks*.jar" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "No JAR found"
            exit 1
          fi

          mkdir -p dist
          cp "$FILE" dist/ActualBooks-ver.jar

          ls -lah dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ActualBooks
          path: dist/ActualBooks-ver.jar

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ActualBooks-ver.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
