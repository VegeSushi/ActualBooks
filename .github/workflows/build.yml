name: Build and Release Plugin

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew build

      - name: Debug build output (important)
        run: |
          echo "=== build/libs ==="
          ls -lah build/libs || true

      - name: Find JAR and rename
        run: |
          set -e

          echo "Searching for JAR..."
          JAR=$(find build/libs -type f -name "*.jar" | head -n 1)

          echo "Found: $JAR"

          if [ -z "$JAR" ]; then
            echo "No JAR found in build/libs"
            exit 1
          fi

          mkdir -p dist
          cp "$JAR" dist/ActualBooks-ver.jar

          echo "Final output:"
          ls -lah dist

      - name: Upload artifact (CI builds)
        uses: actions/upload-artifact@v4
        with:
          name: ActualBooks
          path: dist/ActualBooks-ver.jar

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ActualBooks-ver.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
